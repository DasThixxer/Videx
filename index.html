<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Videx</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Sidebar overlay backdrop -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Videx</span>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">&#10005;</button>
    </div>
    <div class="source-tabs">
      <button class="source-tab active" data-source="porntubeai">PorntubeAI</button>
      <button class="source-tab" data-source="pmvhaven">PMV Haven</button>
      <button class="source-tab" data-source="spankbang">SpankBang</button>
    </div>
    <!-- Sort options (API sources) -->
    <div class="sub-tabs" id="sortToggle">
      <button class="sub-tab active" data-sort="-views">Top</button>
      <button class="sub-tab" data-sort="-bayesianRating">Rated</button>
    </div>
    <!-- SpankBang sub-tabs (Videos / Related / Search) -->
    <div class="sub-tabs hidden" id="sbSubTabs">
      <button class="sub-tab active" data-panel="videos">Videos</button>
      <button class="sub-tab" data-panel="related">Related</button>
      <button class="sub-tab" data-panel="search">Search</button>
    </div>
    <div class="sb-search-bar hidden" id="sbSearchBar">
      <input type="text" id="sbSearchInput" placeholder="Search SpankBang…" autocomplete="off" />
      <button id="sbSearchBtn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <ul class="video-list" id="videoList"></ul>
    <ul class="video-list hidden" id="relatedList"></ul>
  </aside>

  <!-- Floating menu button -->
  <button class="menu-btn" id="menuBtn" aria-label="Toggle sidebar">
    <span></span><span></span><span></span>
  </button>

  <!-- Main layout -->
  <div class="layout">
    <main class="main">
      <section class="player-section">
        <div class="player-wrapper">
          <video
            id="mainPlayer"
            class="main-video"
            playsinline
            preload="metadata"
          ></video>
          <div class="player-placeholder" id="playerPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <polygon points="5,3 19,12 5,21"/>
            </svg>
            <p>Select a video to play</p>
          </div>
          <!-- Top info overlay -->
          <div class="video-overlay video-overlay-top" id="videoOverlay">
            <h1 class="video-title" id="videoTitle"></h1>
            <div class="video-stats">
              <span id="videoViews"></span>
              <span id="videoDuration"></span>
              <span id="videoDescription"></span>
              <span id="videoDate"></span>
            </div>
          </div>
          <!-- Bottom nav overlay -->
          <div class="video-overlay video-overlay-bottom">
            <button class="nav-btn" id="prevBtn" aria-label="Previous video">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button class="nav-btn" id="nextBtn" aria-label="Next video">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
